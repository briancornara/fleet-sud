
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
  },
});

const diagram = `erDiagram
  USUARIO {
    int id_usuario PK
    string nombre
    string apellido
    string email
    string password_hash
    string rol
    boolean activo
    datetime created_at
  }

  OBRA {
    int id_obra PK
    string nombre
    string ubicacion
    string descripcion
    boolean activa
  }

  RESPONSABLE {
    int id_responsable PK
    int id_usuario FK
    int id_obra FK
    date fecha_asignacion
  }

  EQUIPO {
    int id_equipo PK
    string codigo_interno
    string tipo
    string marca
    string modelo
    int anio
    string patente
    string estado
    decimal km_actuales
    decimal horas_actuales
    datetime created_at
  }

  ASIGNACION_EQUIPO_OBRA {
    int id_asignacion PK
    int id_equipo FK
    int id_obra FK
    date fecha_inicio
    date fecha_fin
    boolean activa
  }

  INSPECCION {
    int id_inspeccion PK
    int id_equipo FK
    int id_usuario FK
    datetime fecha_hora
    decimal km_registrados
    decimal horas_registradas
    string observaciones
    string estado_general
  }

  CHECKLIST_ITEM {
    int id_item PK
    string descripcion
    string categoria
    boolean obligatorio
  }

  INSPECCION_DETALLE {
    int id_detalle PK
    int id_inspeccion FK
    int id_item FK
    string resultado
    string observacion
  }

  INCIDENCIA {
    int id_incidencia PK
    int id_equipo FK
    int id_usuario FK
    datetime fecha_hora
    string tipo
    string descripcion
    string estado
    string prioridad
    datetime fecha_cierre
  }

  FOTO_INCIDENCIA {
    int id_foto PK
    int id_incidencia FK
    string ruta_archivo
    datetime uploaded_at
  }

  MANTENIMIENTO {
    int id_mantenimiento PK
    int id_equipo FK
    int id_usuario FK
    string tipo
    string descripcion
    date fecha_programada
    date fecha_realizada
    string estado
    decimal costo
    string taller
    string observaciones
  }

  USUARIO ||--o{ RESPONSABLE : "es asignado como"
  OBRA ||--o{ RESPONSABLE : "tiene"
  USUARIO ||--o{ INSPECCION : "realiza"
  USUARIO ||--o{ INCIDENCIA : "registra"
  USUARIO ||--o{ MANTENIMIENTO : "gestiona"
  EQUIPO ||--o{ ASIGNACION_EQUIPO_OBRA : "tiene"
  OBRA ||--o{ ASIGNACION_EQUIPO_OBRA : "recibe"
  EQUIPO ||--o{ INSPECCION : "recibe"
  EQUIPO ||--o{ INCIDENCIA : "presenta"
  EQUIPO ||--o{ MANTENIMIENTO : "recibe"
  INSPECCION ||--o{ INSPECCION_DETALLE : "contiene"
  CHECKLIST_ITEM ||--o{ INSPECCION_DETALLE : "es evaluado en"
  INCIDENCIA ||--o{ FOTO_INCIDENCIA : "tiene"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
